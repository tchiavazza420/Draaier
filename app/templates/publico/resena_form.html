{% extends "base.html" %}
{% block title %}Dejar reseña · {{ negocio.nombre }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-1">¿Cómo fue tu experiencia?</h1>
        <p class="text-muted">{{ reserva.servicio.nombre }} · {{ reserva.inicio.strftime('%d/%m/%Y') }}</p>

        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Calificación</label>
            <select name="calificacion" class="form-select" required>
              <option value="5">★★★★★ Excelente</option>
              <option value="4">★★★★ Muy bueno</option>
              <option value="3">★★★ Bueno</option>
              <option value="2">★★ Regular</option>
              <option value="1">★ Malo</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Comentario (opcional)</label>
            <textarea name="comentario" class="form-control" rows="4" maxlength="2000"></textarea>
          </div>
          <button class="btn btn-warning">Enviar reseña</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
