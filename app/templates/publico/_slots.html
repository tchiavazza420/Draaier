{# Parcial HTMX: turnos disponibles. Cada botón carga el formulario de datos. #}
{% if error %}
  <div class="alert alert-danger mb-0">{{ error }}</div>
{% elif slots %}
  <p class="text-muted small mb-2">{{ slots|length }} turno(s) disponible(s):</p>
  <div class="d-flex flex-wrap gap-2">
    {% for slot in slots %}
      <button type="button" class="btn btn-outline-success btn-sm"
              hx-get="{{ url_for('publico.reservar_form', slug=negocio.slug) }}"
              hx-target="#form-reserva"
              hx-vals='{"servicio": "{{ servicio.slug }}",
                        "recurso": "{{ slot.recursos[0].id }}",
                        "inicio": "{{ slot.inicio.strftime('%Y-%m-%dT%H:%M') }}"}'>
        {{ slot.inicio.strftime('%H:%M') }}
      </button>
    {% endfor %}
  </div>
{% else %}
  <div class="alert alert-warning mb-0">
    No hay turnos disponibles para esa fecha. Probá con otra.
  </div>
{% endif %}
