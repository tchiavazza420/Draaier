{# Parcial HTMX: horarios para reprogramar. Cada botón confirma el cambio. #}
{% if error %}
  <div class="alert alert-danger mb-0">{{ error }}</div>
{% elif slots %}
  <p class="text-muted small mb-2">{{ slots|length }} horario(s) disponible(s):</p>
  <form method="post" action="{{ url_for('publico.reserva_reprogramar_post', slug=negocio.slug, codigo=reserva.codigo) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="slot-grid">
      {% for slot in slots %}
        <button type="submit" name="inicio" value="{{ slot[0].strftime('%Y-%m-%dT%H:%M') }}"
                class="slot-btn">
          {{ slot[0].strftime('%H:%M') }}
        </button>
      {% endfor %}
    </div>
  </form>
{% else %}
  <div class="alert alert-warning mb-0">No hay horarios disponibles para esa fecha. Probá con otra.</div>
{% endif %}
