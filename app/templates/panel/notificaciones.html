{% extends "base.html" %}
{% block title %}Notificaciones · Panel{% endblock %}
{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
  <h1 class="h3 mb-0">🔔 Notificaciones</h1>
  <div class="d-flex gap-2">
    <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('panel.dashboard') }}">← Panel</a>
    <form method="post" action="{{ url_for('panel.notificaciones_leer_todas') }}" class="m-0">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button class="btn btn-outline-primary btn-sm">Marcar todas como leídas</button>
    </form>
  </div>
</div>

<div class="card"><div class="card-body p-0">
  {% if items %}
    <div class="list-group list-group-flush">
      {% for n in items %}
        <form method="post" action="{{ url_for('panel.notificacion_leer', notif_id=n.id) }}" class="m-0">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit"
                  class="list-group-item list-group-item-action d-flex gap-3 align-items-start text-start {{ '' if n.leida else 'fw-semibold' }}"
                  style="{{ '' if n.leida else 'background:color-mix(in srgb,var(--marca,#6d28d9) 5%,transparent)' }}">
            <span style="font-size:1.3rem">{{ n.icono }}</span>
            <span class="flex-grow-1">
              <span class="d-block">{{ n.titulo }}{% if not n.leida %} <span class="badge bg-danger rounded-pill align-middle" style="font-size:.6rem">nuevo</span>{% endif %}</span>
              {% if n.mensaje %}<small class="text-muted d-block">{{ n.mensaje }}</small>{% endif %}
              <small class="text-muted">{{ n.created_at.strftime('%d/%m/%Y %H:%M') }}</small>
            </span>
          </button>
        </form>
      {% endfor %}
    </div>
  {% else %}
    <div class="text-center text-muted py-5">No tenés notificaciones todavía.</div>
  {% endif %}
</div></div>
{% endblock %}
