<!doctype html>
<html lang="es">
<head><meta charset="utf-8"></head>
<body style="font-family:Arial,Helvetica,sans-serif;background:#f4f4f7;margin:0;padding:24px;">
  <div style="max-width:520px;margin:0 auto;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb">
    <div style="background:#111827;color:#fff;padding:18px 24px;font-weight:bold;font-size:18px">
      {{ negocio.nombre }}
    </div>
    <div style="padding:24px;color:#111827;line-height:1.5">
      {% block cuerpo %}{% endblock %}
    </div>
    <div style="padding:16px 24px;background:#f9fafb;color:#6b7280;font-size:12px;border-top:1px solid #e5e7eb">
      Enviado por AgenPro · Este es un email automático.
    </div>
  </div>
</body>
</html>
