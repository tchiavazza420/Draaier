{% extends "base.html" %}
{% block title %}Calendario · Panel{% endblock %}

{% block head_extra %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 mb-0">Calendario</h1>
  <div>
    <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('panel.dashboard') }}">← Panel</a>
    <a class="btn btn-outline-primary btn-sm" href="{{ url_for('reservas.listar') }}">Ver lista</a>
    <a class="btn btn-primary btn-sm" href="{{ url_for('reservas.nueva') }}">+ Reserva</a>
  </div>
</div>

<!-- Switcher de vista propio (solo mobile): siempre visible arriba, no lo tapa la barra inferior -->
<div class="btn-group w-100 mb-3 d-md-none" role="group" id="vista-switcher">
  <button type="button" class="btn btn-outline-primary btn-sm active" data-vista="dayGridMonth">Mes</button>
  <button type="button" class="btn btn-outline-primary btn-sm" data-vista="listWeek">Lista</button>
  <button type="button" class="btn btn-outline-primary btn-sm" data-vista="timeGridDay">Día</button>
  <button type="button" class="btn btn-outline-primary btn-sm" data-vista="timeGridWeek">Semana</button>
</div>

<div class="card cal-card"><div class="card-body">
  <div id="calendario"></div>
</div></div>

<!-- Panel del día (se abre al tocar un día en la vista Mes) -->
<div id="dia-sheet" class="dia-sheet" aria-hidden="true">
  <div class="dia-sheet-backdrop" data-cerrar></div>
  <div class="dia-sheet-card" role="dialog" aria-modal="true">
    <div class="dia-sheet-handle" data-cerrar></div>
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h2 class="h6 mb-0 con-dot" id="dia-sheet-titulo">Día</h2>
      <button type="button" class="btn-close" data-cerrar aria-label="Cerrar"></button>
    </div>
    <div id="dia-sheet-body"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('calendario');
    const esMobile = window.matchMedia('(max-width: 767px)').matches;

    const cal = new FullCalendar.Calendar(el, {
      locale: 'es',
      // Vista por defecto: el mes (más panorámica), en celular y escritorio.
      initialView: 'dayGridMonth',
      headerToolbar: esMobile
        ? { left: 'prev,next', center: 'title', right: 'today' }
        : { left: 'prev,next today', center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek' },
      fixedWeekCount: false,
      // En mobile el switcher de vistas es nuestro (arriba), no el footer.
      footerToolbar: false,
      buttonText: { today: 'Hoy', month: 'Mes', week: 'Semana', day: 'Día', list: 'Lista' },
      slotMinTime: '07:00:00',
      slotMaxTime: '23:00:00',
      nowIndicator: true,
      height: 'auto',
      expandRows: true,
      stickyHeaderDates: true,
      dayMaxEvents: 3,
      moreLinkText: (n) => `+${n}`,
      eventDisplay: 'block',
      allDaySlot: false,
      slotLabelFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
      eventTimeFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
      noEventsText: 'No hay turnos en este período',
      events: '{{ url_for("reservas.agenda_eventos") }}',
      // En el MES, tocar un día (o un turno) agranda ese día en un panel.
      dateClick: (info) => { if (cal.view.type === 'dayGridMonth') abrirDia(info.date); },
      eventClick: (info) => {
        if (cal.view.type === 'dayGridMonth') {
          info.jsEvent.preventDefault();
          abrirDia(info.event.start);
          return;
        }
        if (info.event.url) { info.jsEvent.preventDefault(); window.location = info.event.url; }
      },
      // Render minimalista por vista.
      eventContent: (arg) => {
        const p = arg.event.extendedProps;
        const color = arg.event.backgroundColor || 'var(--marca)';
        const view = arg.view.type;

        // LISTA: servicio + cliente (la hora la pone la columna de la lista).
        if (view.startsWith('list')) {
          const wrap = document.createElement('div');
          const s = document.createElement('span');
          s.style.fontWeight = '700';
          s.textContent = p.servicio || arg.event.title;
          wrap.appendChild(s);
          if (p.cliente) {
            const c = document.createElement('span');
            c.style.opacity = '.7';
            c.textContent = ' · ' + p.cliente;
            wrap.appendChild(c);
          }
          return { domNodes: [wrap] };
        }

        const wrap = document.createElement('div');
        wrap.className = 'fc-min';
        // MES: punto de color + hora (compacto, sin servicio: el color ya lo dice).
        if (view === 'dayGridMonth') {
          const dot = document.createElement('span');
          dot.className = 'fc-min-dot';
          dot.style.background = color;
          wrap.appendChild(dot);
          const t = document.createElement('span');
          t.className = 'fc-min-time';
          t.textContent = arg.timeText || '';
          wrap.appendChild(t);
          return { domNodes: [wrap] };
        }

        // DÍA / SEMANA: hora + servicio (el bloque ya tiene el color).
        if (arg.timeText) {
          const t = document.createElement('span');
          t.className = 'fc-min-time';
          t.textContent = arg.timeText;
          wrap.appendChild(t);
        }
        const s = document.createElement('span');
        s.className = 'fc-min-serv';
        s.textContent = p.servicio || arg.event.title;
        wrap.appendChild(s);
        return { domNodes: [wrap] };
      },
      eventDidMount: (info) => {
        const e = info.event.extendedProps;
        info.el.title = `${info.event.title}\n${e.recurso} · ${e.estado}`;
      }
    });
    cal.render();

    // ----- Panel del día (bottom sheet) -----
    const sheet = document.getElementById('dia-sheet');
    const sheetTit = document.getElementById('dia-sheet-titulo');
    const sheetBody = document.getElementById('dia-sheet-body');
    const ESTADO_COLOR = { confirmado:'#16a34a', pendiente_pago:'#f59e0b', en_proceso:'#3b82f6',
      finalizado:'#6b7280', cancelado:'#ef4444', ausente:'#ef4444', reprogramado:'#a855f7' };
    const mismoDia = (a, b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
    const fmtHora = (d) => String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');

    function abrirDia(date) {
      const turnos = cal.getEvents().filter(e => e.start && mismoDia(e.start, date))
                        .sort((a,b) => a.start - b.start);
      sheetTit.textContent = date.toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long' });
      if (!turnos.length) {
        sheetBody.innerHTML = '<p class="text-muted small py-3 mb-2 text-center">No hay turnos este día.</p>'+
          '<a class="btn btn-primary w-100" href="{{ url_for("reservas.nueva") }}">+ Reservar un turno</a>';
      } else {
        sheetBody.innerHTML = turnos.map(e => {
          const p = e.extendedProps || {};
          const col = e.backgroundColor || 'var(--marca)';
          const estCol = ESTADO_COLOR[p.estado] || '#6b7280';
          return `<a href="${e.url}" class="dia-turno">
            <span class="dia-turno-hora">${fmtHora(e.start)}</span>
            <span class="dia-turno-bar" style="background:${col}"></span>
            <span class="dia-turno-info">
              <span class="dia-turno-serv">${p.servicio || ''}</span>
              <span class="dia-turno-cli">${p.cliente || ''}</span>
            </span>
            <span class="dia-turno-estado" style="color:${estCol};border-color:${estCol}">${(p.estado||'').replace('_',' ')}</span>
          </a>`;
        }).join('');
      }
      sheet.classList.add('abierto');
      sheet.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }
    function cerrarDia() {
      sheet.classList.remove('abierto');
      sheet.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }
    sheet.querySelectorAll('[data-cerrar]').forEach(el => el.addEventListener('click', cerrarDia));
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') cerrarDia(); });

    // Switcher de vista propio (mobile): cambia la vista y marca el activo.
    const switcher = document.getElementById('vista-switcher');
    if (switcher) {
      switcher.querySelectorAll('button[data-vista]').forEach((b) => {
        b.addEventListener('click', () => {
          cal.changeView(b.dataset.vista);
          switcher.querySelectorAll('button').forEach((x) => x.classList.remove('active'));
          b.classList.add('active');
        });
      });
    }

    // Si rota el teléfono / cambia el tamaño, ajustamos la vista por defecto.
    // (la vista por defecto es el mes; el usuario cambia con el switcher)
  });
</script>
{% endblock %}
