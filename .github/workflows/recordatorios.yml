name: Recordatorios (manual / respaldo)

# NOTA: en Render Starter el disparo diario lo hace el Cron Job nativo
# (ver render.yaml). Este workflow queda solo como RESPALDO MANUAL para
# ejecutarlo a mano desde Actions -> Run workflow, sin duplicar envíos.
#
# Si algún día NO usás el Cron Job de Render, descomentá el bloque "schedule"
# de abajo y cargá los secrets SITE_URL y CRON_TOKEN en el repo.

on:
  workflow_dispatch: {}   # solo manual (evita duplicar con el cron de Render)
  # schedule:
  #   - cron: "0 11 * * *"   # 11:00 UTC ≈ 08:00 Argentina

jobs:
  disparar:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al endpoint de tareas
        run: |
          echo "Disparando tareas programadas…"
          codigo=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "${{ secrets.SITE_URL }}/tareas/correr?dias=1" \
            -H "X-Cron-Token: ${{ secrets.CRON_TOKEN }}")
          echo "HTTP $codigo"
          cat /tmp/resp.json || true
          if [ "$codigo" != "200" ]; then
            echo "::error::El endpoint respondió $codigo"
            exit 1
          fi
