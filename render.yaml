# ===========================================================================
#  Render Blueprint — versión PLAN FREE (web + Postgres)
#
#  El plan free de Render no incluye background workers ni preDeployCommand,
#  así que acá Celery corre en modo EAGER (las tareas se ejecutan dentro del
#  proceso web, sin worker ni Redis). Las migraciones + seed corren al arrancar.
#
#  Para escalar a async real (worker + beat + Redis), descomentá la sección de
#  más abajo y pasá los servicios a un plan pago (Starter).
#
#  Subí el repo a GitHub y en Render: New > Blueprint > seleccioná este repo.
# ===========================================================================

databases:
  - name: reservas-db
    databaseName: reservas_saas
    plan: free

services:
  # --- Web (gunicorn) ---
  - type: web
    name: reservas-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # En free no hay preDeployCommand: migramos + seed al arrancar (idempotente).
    startCommand: flask db upgrade && flask seed-roles && gunicorn -c gunicorn.conf.py wsgi:app
    # Dominio propio (configurar también los DNS en el registrar — ver DOMINIO.md).
    domains:
      - www.agenpro.com.ar
      - agenpro.com.ar
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.7"
      # URL pública del sitio (back_urls de pagos, webhooks, links de emails).
      - key: SITE_URL
        value: https://www.agenpro.com.ar
      # Token del endpoint de tareas programadas (/tareas/correr). Un cron
      # externo gratis (GitHub Actions / cron-job.org) lo usa para disparar
      # recordatorios y vencimientos en plan free. Ver RECORDATORIOS.md.
      - key: CRON_TOKEN
        generateValue: true
      # Sin worker en free -> Celery corre síncrono (eager).
      - key: CELERY_EAGER
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: reservas-db
          property: connectionString

