# ===========================================================================
#  Render Blueprint — PLAN STARTER (web + Postgres + Cron Job)
#
#  - Web en plan Starter (no se duerme por inactividad).
#  - Cron Job nativo de Render que dispara los recordatorios y los vencimientos
#    todos los días pegándole al endpoint /tareas/correr (reusa todo el entorno
#    de la web: mail, WhatsApp, etc.). Ver INTEGRACIONES.md.
#  - Celery sigue en modo EAGER (las notificaciones se envían dentro del request
#    web). Si más adelante querés async real, descomentá la sección worker+beat+
#    Redis del final y poné CELERY_EAGER=false.
#
#  Subí el repo a GitHub y en Render: New > Blueprint > seleccioná este repo.
# ===========================================================================

databases:
  - name: reservas-db
    databaseName: reservas_saas
    # Postgres pago para producción (no expira como el free de 90 días).
    plan: basic-256mb

services:
  # --- Web (gunicorn) ---
  - type: web
    name: reservas-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    # Migramos + seed al arrancar (idempotente).
    startCommand: flask db upgrade && flask seed-roles && gunicorn -c gunicorn.conf.py wsgi:app
    # Dominio propio (configurar también los DNS en el registrar — ver DOMINIO.md).
    domains:
      - www.agenpro.com.ar
      - agenpro.com.ar
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.7"
      # URL pública del sitio (back_urls de pagos, webhooks, links de emails).
      - key: SITE_URL
        value: https://www.agenpro.com.ar
      # Token del endpoint de tareas programadas (/tareas/correr). Lo usa el
      # Cron Job de abajo (lo comparte vía fromService). Ver INTEGRACIONES.md.
      - key: CRON_TOKEN
        generateValue: true
      # Notificaciones síncronas (sin worker). Cambiar a "false" si activás Celery.
      - key: CELERY_EAGER
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: reservas-db
          property: connectionString

  # --- Cron Job: recordatorios + vencimientos (diario) ---
  # Le pega al endpoint /tareas/correr de la web (que ya tiene mail/WhatsApp
  # configurados). Usa solo la stdlib de Python (sin dependencias ni build).
  # 11:00 UTC ≈ 08:00 Argentina (UTC-3).
  - type: cron
    name: agenpro-recordatorios
    runtime: python
    plan: starter
    schedule: "0 11 * * *"
    buildCommand: "echo sin build"
    # timeout alto: una corrida con muchos envíos (email/WhatsApp) puede tardar.
    # User-Agent de navegador: algunos WAF/proxys responden 403 al UA por
    # defecto de urllib (Python-urllib/x). Con un UA de browser pasan.
    startCommand: >-
      python -c "import os,urllib.request as u;
      req=u.Request(os.environ['SITE_URL'].rstrip('/')+'/tareas/correr?dias=1',
      method='POST',
      headers={'X-Cron-Token':os.environ['CRON_TOKEN'],
      'User-Agent':'Mozilla/5.0 (AgenPro-Cron)'});
      print(u.urlopen(req, timeout=300).read().decode())"
    envVars:
      - key: SITE_URL
        value: https://www.agenpro.com.ar
      # Mismo token que la web (se copia automáticamente).
      - key: CRON_TOKEN
        fromService:
          type: web
          name: reservas-web
          envVarKey: CRON_TOKEN

