# ===========================================================================
#  Render Blueprint — PLAN STARTER (web + Postgres + Cron Job)
#
#  - Web en plan Starter (no se duerme por inactividad).
#  - Cron Job nativo de Render que dispara los recordatorios y los vencimientos
#    todos los días pegándole al endpoint /tareas/correr (reusa todo el entorno
#    de la web: mail, WhatsApp, etc.). Ver INTEGRACIONES.md.
#  - Celery sigue en modo EAGER (las notificaciones se envían dentro del request
#    web). Si más adelante querés async real, descomentá la sección worker+beat+
#    Redis del final y poné CELERY_EAGER=false.
#
#  Subí el repo a GitHub y en Render: New > Blueprint > seleccioná este repo.
# ===========================================================================

databases:
  - name: reservas-db
    databaseName: reservas_saas
    # Postgres pago para producción (no expira como el free de 90 días).
    plan: basic-256mb

services:
  # --- Web (gunicorn) ---
  - type: web
    name: reservas-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    # Migramos + seed al arrancar (idempotente).
    startCommand: flask db upgrade && flask seed-roles && gunicorn -c gunicorn.conf.py wsgi:app
    # Dominio propio (configurar también los DNS en el registrar — ver DOMINIO.md).
    domains:
      - www.agenpro.com.ar
      - agenpro.com.ar
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.7"
      # URL pública del sitio (back_urls de pagos, webhooks, links de emails).
      - key: SITE_URL
        value: https://www.agenpro.com.ar
      # Token del endpoint de tareas programadas (/tareas/correr). Lo usa el
      # Cron Job de abajo (lo comparte vía fromService). Ver INTEGRACIONES.md.
      - key: CRON_TOKEN
        generateValue: true
      # Notificaciones ASÍNCRONAS: la web encola en Redis y responde al instante;
      # el worker (reservas-worker) hace los envíos. Para volver a síncrono,
      # poné "true" y pausá worker + Redis.
      - key: CELERY_EAGER
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: reservas-db
          property: connectionString
      # Cola de tareas (broker + result backend). Internal connection string.
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: reservas-redis
          property: connectionString

  # --- Cron Job: recordatorios + vencimientos (diario) ---
  # Le pega al endpoint /tareas/correr de la web (que ya tiene mail/WhatsApp
  # configurados). Usa solo la stdlib de Python (sin dependencias ni build).
  # 11:00 UTC ≈ 08:00 Argentina (UTC-3).
  - type: cron
    name: agenpro-recordatorios
    runtime: python
    plan: starter
    schedule: "0 11 * * *"
    buildCommand: "echo sin build"
    # timeout alto: una corrida con muchos envíos (email/WhatsApp) puede tardar.
    # User-Agent de navegador: algunos WAF/proxys responden 403 al UA por
    # defecto de urllib (Python-urllib/x). Con un UA de browser pasan.
    startCommand: >-
      python -c "import os,urllib.request as u;
      req=u.Request(os.environ['SITE_URL'].rstrip('/')+'/tareas/correr?dias=1',
      method='POST',
      headers={'X-Cron-Token':os.environ['CRON_TOKEN'],
      'User-Agent':'Mozilla/5.0 (AgenPro-Cron)'});
      print(u.urlopen(req, timeout=300).read().decode())"
    envVars:
      - key: SITE_URL
        value: https://www.agenpro.com.ar
      # Mismo token que la web (se copia automáticamente).
      - key: CRON_TOKEN
        fromService:
          type: web
          name: reservas-web
          envVarKey: CRON_TOKEN

  # --- Cron Job: recordatorio "2 horas antes" (cada hora) ---
  # Pega a /tareas/correr?proximas=2 cada hora: avisa a las reservas que
  # empiezan dentro de las próximas 2 h (una sola vez por reserva).
  - type: cron
    name: agenpro-recordatorios-2h
    runtime: python
    plan: starter
    schedule: "0 * * * *"
    buildCommand: "echo sin build"
    startCommand: >-
      python -c "import os,urllib.request as u;
      req=u.Request(os.environ['SITE_URL'].rstrip('/')+'/tareas/correr?proximas=2',
      method='POST',
      headers={'X-Cron-Token':os.environ['CRON_TOKEN'],
      'User-Agent':'Mozilla/5.0 (AgenPro-Cron)'});
      print(u.urlopen(req, timeout=300).read().decode())"
    envVars:
      - key: SITE_URL
        value: https://www.agenpro.com.ar
      - key: CRON_TOKEN
        fromService:
          type: web
          name: reservas-web
          envVarKey: CRON_TOKEN

# ===========================================================================
#  ASYNC (Celery + Redis) — ACTIVO
#  Redis = cola de tareas; worker = procesa los envíos en segundo plano.
#  El beat NO hace falta: los recordatorios los dispara el Cron Job de arriba.
# ===========================================================================
  # --- Redis (cola de tareas) ---
  - type: keyvalue
    name: reservas-redis
    plan: starter
    # Sin acceso externo: solo lo usan la web y el worker por la red interna.
    ipAllowList: []
    # noeviction: nunca descarta tareas encoladas por falta de memoria.
    maxmemoryPolicy: noeviction

  # --- Worker (Celery): hace los envíos (mail / WhatsApp / push) ---
  #  Necesita las MISMAS credenciales que la web, porque ahora es quien envía.
  #  Las hereda con fromService(envVarKey) del servicio reservas-web, así no hay
  #  que duplicar valores. Importante: cada key referenciada DEBE existir en la
  #  web (si alguna no está seteada, quitá esa línea antes del Sync).
  - type: worker
    name: reservas-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_worker.celery worker --loglevel=info --concurrency=2
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: CELERY_EAGER
        value: "false"
      - key: REDIS_URL
        fromService: { type: keyvalue, name: reservas-redis, property: connectionString }
      - key: DATABASE_URL
        fromDatabase: { name: reservas-db, property: connectionString }
      - key: SECRET_KEY
        fromService: { type: web, name: reservas-web, envVarKey: SECRET_KEY }
      # --- URL pública (links de emails / back_urls) ---
      - key: SITE_URL
        value: https://www.agenpro.com.ar
      # --- Email (Brevo SMTP) ---
      - key: MAIL_SERVER
        fromService: { type: web, name: reservas-web, envVarKey: MAIL_SERVER }
      - key: MAIL_PORT
        fromService: { type: web, name: reservas-web, envVarKey: MAIL_PORT }
      - key: MAIL_USE_TLS
        fromService: { type: web, name: reservas-web, envVarKey: MAIL_USE_TLS }
      - key: MAIL_USERNAME
        fromService: { type: web, name: reservas-web, envVarKey: MAIL_USERNAME }
      - key: MAIL_PASSWORD
        fromService: { type: web, name: reservas-web, envVarKey: MAIL_PASSWORD }
      - key: MAIL_DEFAULT_SENDER
        fromService: { type: web, name: reservas-web, envVarKey: MAIL_DEFAULT_SENDER }
      # --- WhatsApp (Meta Cloud API) ---
      - key: WHATSAPP_API_VERSION
        value: "25.0"
      - key: WHATSAPP_TOKEN
        fromService: { type: web, name: reservas-web, envVarKey: WHATSAPP_TOKEN }
      - key: WHATSAPP_PHONE_ID
        fromService: { type: web, name: reservas-web, envVarKey: WHATSAPP_PHONE_ID }
      - key: WHATSAPP_TEMPLATE_CONFIRMACION
        fromService: { type: web, name: reservas-web, envVarKey: WHATSAPP_TEMPLATE_CONFIRMACION }
      - key: WHATSAPP_TEMPLATE_RECORDATORIO
        fromService: { type: web, name: reservas-web, envVarKey: WHATSAPP_TEMPLATE_RECORDATORIO }
      # --- Imágenes (Cloudinary) ---
      - key: CLOUDINARY_URL
        fromService: { type: web, name: reservas-web, envVarKey: CLOUDINARY_URL }
      # --- Push (Web Push / VAPID) ---
      - key: VAPID_PUBLIC_KEY
        fromService: { type: web, name: reservas-web, envVarKey: VAPID_PUBLIC_KEY }
      - key: VAPID_PRIVATE_KEY
        fromService: { type: web, name: reservas-web, envVarKey: VAPID_PRIVATE_KEY }
      - key: VAPID_CLAIM_EMAIL
        fromService: { type: web, name: reservas-web, envVarKey: VAPID_CLAIM_EMAIL }
