# ===========================================================================
#  Render Blueprint — despliega web + worker + beat + Postgres + Redis
#  Subí el repo a GitHub y en Render: New > Blueprint > seleccioná este repo.
#  Render lee este archivo y crea todo. Completá las env vars de pagos/email
#  desde el panel si las necesitás.
# ===========================================================================

databases:
  - name: reservas-db
    databaseName: reservas_saas
    plan: free

services:
  # --- Redis (Key Value) para Celery ---
  - type: keyvalue
    name: reservas-redis
    plan: free
    ipAllowList: []   # solo accesible desde los servicios de Render

  # --- Web (gunicorn) ---
  - type: web
    name: reservas-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: flask db upgrade && flask seed-roles
    startCommand: gunicorn -c gunicorn.conf.py wsgi:app
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: CELERY_EAGER
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: reservas-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: reservas-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: reservas-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: reservas-redis
          property: connectionString

  # --- Worker de Celery ---
  - type: worker
    name: reservas-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_worker.celery worker --loglevel=info
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: CELERY_EAGER
        value: "false"
      - key: SECRET_KEY
        fromService:
          type: web
          name: reservas-web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: reservas-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: reservas-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: reservas-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: reservas-redis
          property: connectionString

  # --- Beat (scheduler de Celery) ---
  - type: worker
    name: reservas-beat
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A celery_worker.celery beat --loglevel=info
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_ENV
        value: production
      - key: CELERY_EAGER
        value: "false"
      - key: SECRET_KEY
        fromService:
          type: web
          name: reservas-web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: reservas-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: reservas-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: reservas-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: reservas-redis
          property: connectionString
